name: "@foundrynet/gov-contracts-mcp"
displayName: "FoundryNet Government Intelligence"
description: >-
  Search federal government contracts, solicitations, and awards. Real-time SAM.gov and USASpending data with trending sector analysis.
icon: "🏛️"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/gov-contracts-mcp"
license: "MIT"
categories:
  - government
  - data
  - research
tags:
  - government-contracts
  - federal-procurement
  - sam-gov
  - usaspending
  - naics
  - solicitations
keywords:
  - government-contracts
  - federal-procurement
  - sam-gov
  - usaspending
  - naics
  - solicitations
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://gov-contracts-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
